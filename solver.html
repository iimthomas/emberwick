<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emberwick — Solver Bot</title>
<style>
  body { font: 14px/1.5 -apple-system, system-ui, sans-serif; margin: 0; background: #17140f; color: #e8e2d4; }
  #game-hidden { display: none; }
  #solver { max-width: 1000px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 24px; margin: 0 0 4px; color: #e8c67a; }
  h2 { font-size: 18px; margin: 28px 0 8px; color: #c9b458; border-bottom: 1px solid #3a352b; padding-bottom: 4px; }
  h3 { font-size: 14px; margin: 16px 0 4px; color: #b0a98f; text-transform: uppercase; letter-spacing: .05em; }
  .meta { color: #8a8f98; margin: 0 0 8px; }
  table { border-collapse: collapse; width: 100%; margin: 6px 0 12px; font-variant-numeric: tabular-nums; }
  th, td { text-align: left; padding: 5px 10px; border-bottom: 1px solid #2a261f; }
  th { color: #b0a98f; font-weight: 600; }
  table.head th:not(:first-child), table.head td:not(:first-child):not(.note) { text-align: right; }
  .note { color: #8a8f98; font-size: 12.5px; }
  .interp { background: #1f1b14; border-left: 3px solid #c9b458; padding: 10px 14px; margin: 8px 0; border-radius: 3px; }
  .pctbar { display: inline-block; width: 60px; height: 8px; background: #2a261f; border-radius: 4px; overflow: hidden; vertical-align: middle; margin-left: 6px; }
  .pctbar > span { display: block; height: 100%; }
  code { background: #2a261f; padding: 1px 5px; border-radius: 3px; color: #d8cfa8; }
  button { font: inherit; background: #3a352b; color: #e8e2d4; border: 1px solid #5a5442; border-radius: 4px; padding: 6px 14px; cursor: pointer; margin-bottom: 12px; }
  button:hover { background: #4a4436; }
  #toolbar { max-width: 1000px; margin: 0 auto; padding: 16px 24px 0; display: flex; gap: 10px; }
</style>
</head>
<body>
  <!-- hidden game DOM so game.js's on-load render() has its panels -->
  <div id="game-hidden">
    <div id="turn-indicator"></div>
    <div id="status-bar"></div>
    <section id="encounter-panel"></section>
    <section id="controls-panel"></section>
    <section id="zones-panel"></section>
    <section id="hand-panel"></section>
    <div id="log"></div>
  </div>

  <div id="toolbar">
    <button onclick="runSolver()">Turn Analysis</button>
    <button onclick="runSimulator()">Run Simulator (events A/B)</button>
  </div>
  <div id="solver">
    <p>Loading…</p>
  </div>

  <script src="game.js"></script>
  <script src="solver.js"></script>
</body>
</html>
